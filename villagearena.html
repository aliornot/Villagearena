ив огня",en:"Fire Against Fire"}},{text:{ru:"Побеждая боссов и монстров одного за другим, он собрал целую гору кристаллов. Победа за победой делала его только сильнее — и только опаснее.",en:"Defeating bosses and monsters one after another, he amassed a mountain of crystals. Each victory made him stronger — and more dangerous."},title:{ru:"Гора кристаллов",en:"Mountain of Crystals"}},{text:{ru:"Собранные кристаллы он принёс к главному порталу и уложил их у древнего каменного круга, будто выполнял ритуал, смысл которого сам ещё не понимал.",en:"He carried the crystals to the main portal and laid them at the ancient stone circle, as if performing a ritual whose meaning he did not yet understand."},title:{ru:"Дар порталу",en:"An Offering to the Portal"}},{text:{ru:"Портал ответил. Свет кристаллов вспыхнул, земля затряслась, и из сияющего разлома вышел Дракон Древности — огромный, тяжёлый и древний, как сама эпоха драконов.",en:"The portal answered. Crystal light flared, the earth shook, and from the shining rift emerged the Ancient Dragon — massive, heavy, and old as the age of dragons itself."},title:{ru:"Пробуждение древности",en:"The Ancient Awakens"}},{text:{ru:"Их битва длилась долго. Небо и земля тонули в огне, пепле и раскалённых вихрях. Ни один не хотел отступать, и поле боя превратилось в выжженную пустошь.",en:"Their battle lasted long. Sky and earth drowned in fire, ash, and scorching whirlwinds. Neither would yield, and the battlefield became a burnt wasteland."},title:{ru:"Огонь и пепел",en:"Fire and Ash"}},{text:{ru:"Падая без сил, Дракон Древности произнёс последние слова: полудракон станет достойным преемником его силы. Эти слова были не похвалой — а приговором.",en:"Collapsing in exhaustion, the Ancient Dragon spoke his final words: the half-dragon would become a worthy heir to his power. It was not praise — but a sentence."},title:{ru:"Слова преемника",en:"Words of Succession"}},{text:{ru:"И тогда полудракон понял, что с ним происходит нечто ужасное. Его тело изменилось окончательно: он стал настоящим драконом и вместе с этим начал терять человечность.",en:"Then the half-dragon understood something terrible was happening to him. His body changed completely: he became a true dragon, and with it, his humanity began to fade."},title:{ru:"Потеря человечности",en:"The Loss of Humanity"}},{text:{ru:"Когда мир померк, его сознание оказалось в логове хранителя порталов — Кристального Паука. Там, среди паутины, кристаллов и холодного света, его ждало нечто ещё страшнее.",en:"When the world went dark, his consciousness awakened in the lair of the portal keeper — the Crystal Spider. There, among webs, crystals, and cold light, something even worse awaited him."},title:{ru:"Логово хранителя",en:"The Keeper's Lair"}}];function act2Canvas({slideIndex:g,width:O,height:Z,lang:x2}){const x=st.useRef(null);return st.useEffect(()=>{const m=x.current;if(!m)return;m.width=O,m.height=Z;const y=m.getContext("2d"),k=O,tt=Z,ot=performance.now();y.clearRect(0,0,k,tt);const v=Math.min(k,tt)/320,z=(M,C,s,nt,St)=>{y.fillStyle=St,y.fillRect(M,C,s,nt)},K=(M,C,s,nt,St,bt=1)=>{y.save(),y.globalAlpha=bt,y.fillStyle=St,y.beginPath(),y.ellipse(M,C,s,nt,0,0,Math.PI*2),y.fill(),y.restore()},it=(M,C,s,nt,St,bt=2,w=1)=>{y.save(),y.globalAlpha=w,y.strokeStyle=St,y.lineWidth=bt,y.lineCap="round",y.beginPath(),y.moveTo(M,C),y.lineTo(s,nt),y.stroke(),y.restore()},yt=(M,C,s)=>{const nt=y.createLinearGradient(0,0,0,tt);nt.addColorStop(0,M),nt.addColorStop(.58,C),nt.addColorStop(1,s),y.fillStyle=nt,y.fillRect(0,0,k,tt)},Qt=(M,C,s,nt)=>{const St=y.createRadialGradient(M,C,0,M,C,nt);St.addColorStop(0,s),St.addColorStop(1,"rgba(0,0,0,0)"),y.fillStyle=St,y.fillRect(0,0,k,tt)},kt=(M="#40210f")=>{z(0,tt*.72,k,tt*.28,M);for(let C=0;C<42;C++){const s=(C*71%503)/503*k,nt=tt*.72+(C*37%100)/100*(tt*.25);it(s,nt,s+3*v,nt-7*v,"rgba(255,200,120,.18)",1*v)}},Bt=(M,C,s,nt=1)=>{y.save(),y.translate(M,C);y.globalAlpha=nt;K(0,s*28,s*20,s*6,"rgba(0,0,0,.28)");z(-s*10,s*4,s*8,s*     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=MedievalSharp&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style id="va-design-enhance">
      /* ============================================================
         Village Arena — design polish (overrides Tailwind utilities)
         Tailwind utilities are in @layer utilities; unlayered rules
         in this stylesheet win the cascade with equal specificity.
         ============================================================ */

      :root{
        --va-wood-1:#1a0e04;
        --va-wood-2:#2a1a0a;
        --va-wood-3:#3a2a1a;
        --va-wood-4:#5a4a3a;
        --va-wood-5:#8b4513;
        --va-gold:#ffd700;
        --va-gold-soft:#f0c060;
        --va-gold-dim:#b8860b;
        --va-parchment:#c8a882;
        --va-shadow-deep:0 18px 38px rgba(0,0,0,.55), 0 6px 12px rgba(0,0,0,.45);
        --va-inner-light:inset 0 1px 0 rgba(255,220,160,.15), inset 0 -1px 0 rgba(0,0,0,.5);
      }

      html, body {
        font-family: 'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
        background:
          radial-gradient(ellipse at 50% 0%, #2a1407 0%, #120804 55%, #050302 100%);
        color-scheme: dark;
      }

      /* Subtle ambient overlay — film-grain-ish without an image */
      body::before{
        content:'';
        position:fixed; inset:0; pointer-events:none; z-index:0;
        background:
          radial-gradient(ellipse at 50% -10%, rgba(255,200,100,.10), transparent 55%),
          radial-gradient(ellipse at 50% 110%, rgba(120,40,20,.18), transparent 60%),
          repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px);
      }

      /* Vignette around the canvas / game viewport */
      canvas{
        filter: contrast(1.03) saturate(1.06);
      }

      /* ============== Typography ============== */
      .text-3xl, .text-4xl, .text-5xl, .text-6xl, .text-7xl{
        font-family: 'Cinzel','MedievalSharp','Trajan Pro',serif;
        letter-spacing: .02em;
        font-weight: 700;
      }
      .text-xs, .text-sm, .text-base, .text-lg, .text-xl{
        letter-spacing: .005em;
      }
      .uppercase{ letter-spacing:.08em; }

      /* Gold text — give it depth and a soft glow */
      .text-\[\#FFD700\]{
        background: linear-gradient(180deg,#fff3a0 0%, #ffd700 45%, #b8860b 100%);
        -webkit-background-clip:text;
        background-clip:text;
        -webkit-text-fill-color: transparent;
        color: transparent;
        text-shadow:
          0 0 14px rgba(255,215,0,.35),
          0 2px 0 rgba(0,0,0,.0);
        filter: drop-shadow(0 2px 4px rgba(0,0,0,.65));
      }

      /* Parchment-tone secondary text */
      .text-\[\#c8a882\]{
        color:#d8b88a;
        text-shadow: 0 1px 0 rgba(0,0,0,.55);
      }

      /* Animated glow on the biggest title */
      @keyframes va-title-glow{
        0%,100%{ filter: drop-shadow(0 2px 6px rgba(0,0,0,.75)) drop-shadow(0 0 8px rgba(255,200,80,.25)); }
        50%   { filter: drop-shadow(0 2px 6px rgba(0,0,0,.75)) drop-shadow(0 0 20px rgba(255,200,80,.55)); }
      }
      .text-6xl.text-\[\#FFD700\], .text-7xl.text-\[\#FFD700\]{
        animation: va-title-glow 3.6s ease-in-out infinite;
      }

      /* ============== Surfaces (modals / panels / cards) ============== */

      /* Default dark-wood surfaces — add gradients & inner light */
      .bg-\[\#0d0704\],
      .bg-\[\#0d0704\]\/90,
      .bg-\[\#1a0e04\],
      .bg-\[\#2a1a0a\]{
        background-image:
          radial-gradient(ellipse at 50% -20%, rgba(255,200,120,.07), transparent 60%),
          linear-gradient(180deg, rgba(80,40,20,.25) 0%, rgba(0,0,0,.35) 100%);
        background-color:#15090400;
      }
      .bg-\[\#0d0704\]{ background-color:#0e0604; }
      .bg-\[\#1a0e04\]{ background-color:#1a0e04; }
      .bg-\[\#2a1a0a\]{ background-color:#241608; }

      .bg-\[\#3a2a0a\],
      .bg-\[\#3a2a1a\]{
        background-image:
          linear-gradient(180deg, #4a3520 0%, #2a1c0c 100%),
          repeating-linear-gradient(90deg, rgba(0,0,0,.06) 0 2px, transparent 2px 5px);
        background-blend-mode: normal, multiply;
        box-shadow: var(--va-inner-light);
      }

      .bg-\[\#5a4a3a\]{
        background-image: linear-gradient(180deg, #6f5a44 0%, #4a3a2a 100%);
        box-shadow: var(--va-inner-light);
      }

      .bg-\[\#3a2a3a\]{
        background-image: linear-gradient(180deg, #4a2a4a 0%, #2a1a2a 100%);
      }

      .bg-\[\#5D4037\]{
        background-image: linear-gradient(180deg, #6d4c41 0%, #4a2f28 100%);
      }

      .bg-\[\#795548\]{
        background-image: linear-gradient(180deg, #8d6e63 0%, #5d4037 100%);
      }

      /* Boss / dark-themed panels keep purple energy */
      .bg-\[\#1a1a2e\]\/90{
        background-image:
          radial-gradient(ellipse at top, rgba(156,39,176,.12), transparent 70%),
          linear-gradient(180deg, #1a1a2e 0%, #0c0c1c 100%);
      }
      .bg-\[\#2e1a1a\]\/90{
        background-image:
          radial-gradient(ellipse at top, rgba(244,67,54,.12), transparent 70%),
          linear-gradient(180deg, #2e1a1a 0%, #1c0c0c 100%);
      }
      .bg-\[\#1a2e1a\]\/90{
        background-image:
          radial-gradient(ellipse at top, rgba(76,175,80,.12), transparent 70%),
          linear-gradient(180deg, #1a2e1a 0%, #0c1c0c 100%);
      }

      /* Gold-bordered surfaces (premium panels) */
      .border-\[\#FFD700\],
      .border-\[\#B8860B\]{
        border-color: var(--va-gold) !important;
        box-shadow:
          inset 0 0 0 1px rgba(255,215,0,.22),
          inset 0 0 28px rgba(0,0,0,.55),
          0 0 22px rgba(255,215,0,.12),
          0 14px 30px rgba(0,0,0,.55);
      }
      .border-\[\#B8860B\]{
        border-color: var(--va-gold-dim) !important;
      }

      /* Wood-tone borders get a thin lighter inner highlight */
      .border-\[\#8B4513\],
      .border-\[\#5D4037\],
      .border-\[\#3E2723\],
      .border-\[\#5a4a3a\],
      .border-\[\#3a2a1a\]{
        box-shadow:
          inset 0 1px 0 rgba(255,220,160,.10),
          inset 0 -1px 0 rgba(0,0,0,.45);
      }

      /* Rounded card vertical lift */
      .rounded-xl, .rounded-lg{
        box-shadow: var(--va-shadow-deep);
      }
      .rounded-xl.bg-\[\#1a0e04\],
      .rounded-xl.bg-\[\#2a1a0a\],
      .rounded-xl.bg-\[\#0d0704\]{
        box-shadow: var(--va-shadow-deep), inset 0 1px 0 rgba(255,215,0,.06);
      }

      /* ============== Buttons ============== */
      button{
        transition: transform .08s ease-out, filter .15s, box-shadow .15s, background-position .25s;
        background-size: 100% 200%;
        background-position: 0 0;
      }
      button:hover{ filter: brightness(1.08) saturate(1.05); background-position: 0 100%; }
      button:active{ filter: brightness(.92); }
      button:focus-visible{
        outline: 2px solid rgba(255,215,0,.6);
        outline-offset: 2px;
      }

      /* Wood brown action button */
      .bg-\[\#8B4513\]{
        background-image: linear-gradient(180deg, #b56321 0%, #8b4513 45%, #6b3410 100%);
        text-shadow: 0 1px 0 rgba(0,0,0,.55);
        box-shadow: var(--va-inner-light);
      }
      .hover\:bg-\[\#8D6E63\]:hover{
        background-image: linear-gradient(180deg, #a07f72 0%, #7d5c50 100%);
      }

      /* Green "play / confirm" */
      .bg-\[\#4CAF50\]{
        background-image: linear-gradient(180deg, #7fd682 0%, #4caf50 50%, #2e7d32 100%);
        text-shadow: 0 1px 0 rgba(0,0,0,.35);
        box-shadow:
          var(--va-inner-light),
          0 0 18px rgba(76,175,80,.30);
      }
      .hover\:bg-\[\#66BB6A\]:hover{
        background-image: linear-gradient(180deg, #8fdb92 0%, #66bb6a 100%);
      }

      /* Gold (primary / VIP / featured) */
      .bg-\[\#FFD700\]{
        background-image: linear-gradient(180deg, #fff4a3 0%, #ffd700 50%, #b8860b 100%);
        color:#3a2407;
        text-shadow: 0 1px 0 rgba(255,255,255,.35);
        box-shadow:
          var(--va-inner-light),
          0 0 22px rgba(255,215,0,.30);
      }

      /* Red (danger / exit) */
      .bg-\[\#f44336\]{
        background-image: linear-gradient(180deg, #ff7065 0%, #f44336 50%, #b71c1c 100%);
        text-shadow: 0 1px 0 rgba(0,0,0,.4);
        box-shadow: var(--va-inner-light), 0 0 18px rgba(244,67,54,.25);
      }
      .hover\:bg-\[\#e57373\]:hover{
        background-image: linear-gradient(180deg, #ff9a90 0%, #e57373 100%);
      }

      /* Orange */
      .bg-\[\#FF9800\]{
        background-image: linear-gradient(180deg, #ffc168 0%, #ff9800 50%, #e65100 100%);
        text-shadow: 0 1px 0 rgba(0,0,0,.35);
        box-shadow: var(--va-inner-light), 0 0 18px rgba(255,152,0,.25);
      }
      .hover\:bg-\[\#FFB74D\]:hover{
        background-image: linear-gradient(180deg, #ffd180 0%, #ffb74d 100%);
      }

      /* Purple (boss / mystic) */
      .bg-\[\#9c27b0\]{
        background-image: linear-gradient(180deg, #c259d6 0%, #9c27b0 50%, #6a1b9a 100%);
        text-shadow: 0 1px 0 rgba(0,0,0,.45);
        box-shadow: var(--va-inner-light), 0 0 22px rgba(156,39,176,.35);
      }

      /* Dark / subtle wood buttons */
      .bg-\[\#5D4037\]{
        background-image: linear-gradient(180deg, #7b574c 0%, #4a2f28 100%);
        box-shadow: var(--va-inner-light);
      }
      .bg-\[\#5a4a3a\]{
        background-image: linear-gradient(180deg, #76624c 0%, #4a3a2a 100%);
        box-shadow: var(--va-inner-light);
      }
      .bg-\[\#3a2a1a\]{
        background-image: linear-gradient(180deg, #4d3724 0%, #2a1c0c 100%);
        box-shadow: var(--va-inner-light);
      }
      .hover\:bg-\[\#4a3a2a\]:hover{
        background-image: linear-gradient(180deg, #5e482e 0%, #3a2a1a 100%);
      }

      /* "Press down" feel on the buttons that use border-b-4 + active:mt-1 */
      .border-b-4:not(:active),
      .border-b-3:not(:active),
      .border-b-2:not(:active){
        box-shadow: var(--va-inner-light), 0 4px 0 rgba(0,0,0,.35);
      }
      .border-b-4:active,
      .border-b-3:active,
      .border-b-2:active{
        box-shadow: inset 0 2px 5px rgba(0,0,0,.35);
      }

      /* Make pill / rounded-full things look like coins/badges */
      .rounded-full.bg-\[\#FFD700\]{
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,.6),
          inset 0 -2px 0 rgba(120,80,0,.5),
          0 0 14px rgba(255,215,0,.45);
      }

      /* HP / progress bars (rounded-r-full inside a border-r style) */
      .rounded-r-full{
        background-image: linear-gradient(180deg, rgba(255,255,255,.25) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,.25) 100%);
      }

      /* ============== Misc ============== */

      /* Dashed dividers more atmospheric */
      .border-dashed{
        border-color: rgba(255,215,0,.35) !important;
      }

      /* Inputs */
      input, textarea, select{
        background: linear-gradient(180deg, #1c1209 0%, #0e0804 100%);
        color: #f5e6c8;
        border: 1px solid #5a4a3a;
        border-radius: .5rem;
        padding: .5rem .75rem;
        box-shadow: inset 0 1px 0 rgba(0,0,0,.5);
        transition: border-color .15s, box-shadow .15s;
      }
      input:focus, textarea:focus, select:focus{
        outline: none;
        border-color: var(--va-gold);
        box-shadow: inset 0 1px 0 rgba(0,0,0,.5), 0 0 0 3px rgba(255,215,0,.18);
      }

      /* Scrollbar themed */
      *::-webkit-scrollbar{ width:10px; height:10px; }
      *::-webkit-scrollbar-track{
        background: linear-gradient(180deg, rgba(0,0,0,.5), rgba(0,0,0,.25));
        border-radius: 6px;
      }
      *::-webkit-scrollbar-thumb{
        background: linear-gradient(180deg, #8b4513 0%, #5a4a3a 100%);
        border-radius: 6px;
        border: 1px solid #3a2a1a;
      }
      *::-webkit-scrollbar-thumb:hover{
        background: linear-gradient(180deg, #d4a040 0%, #8b4513 100%);
      }

      /* Backdrop dim layers — slightly warmer, more cinematic */
      .bg-black\/50,
      .bg-black\/70,
      .bg-black\/75{
        background-color: rgba(8,4,2,.62);
        backdrop-filter: blur(6px) saturate(1.05);
        -webkit-backdrop-filter: blur(6px) saturate(1.05);
      }
      .bg-black\/70{ background-color: rgba(8,4,2,.74); }
      .bg-black\/75{ background-color: rgba(8,4,2,.80); }

      /* Smooth card entry pulse */
      @keyframes va-card-in{
        from{ opacity:0; transform: translateY(10px) scale(.985); }
        to  { opacity:1; transform: translateY(0)   scale(1); }
      }
      .fixed.inset-0 > .rounded-xl,
      .fixed.inset-0 > .relative,
      .fixed.inset-0 .max-w-lg,
      .fixed.inset-0 .max-w-xl,
      .fixed.inset-0 .max-w-2xl{
        animation: va-card-in .28s ease-out both;
      }

      /* Hover lift on character / option cards */
      .border-2.rounded-xl, .border-4.rounded-xl{
        transition: transform .15s ease-out, box-shadow .2s ease-out, border-color .2s;
      }
      .border-2.rounded-xl:hover, .border-4.rounded-xl:hover{
        transform: translateY(-2px);
        box-shadow: var(--va-shadow-deep), 0 0 24px rgba(255,215,0,.18);
      }

      /* Pulse for gold-bordered selected items (using ring + gold border) */
      @keyframes va-select-pulse{
        0%,100%{ box-shadow:
          inset 0 0 0 1px rgba(255,215,0,.30),
          0 0 18px rgba(255,215,0,.20),
          0 12px 28px rgba(0,0,0,.55);
        }
        50%   { box-shadow:
          inset 0 0 0 1px rgba(255,215,0,.55),
          0 0 32px rgba(255,215,0,.45),
          0 12px 28px rgba(0,0,0,.55);
        }
      }
      .border-4.border-\[\#FFD700\]{
        animation: va-select-pulse 2.4s ease-in-out infinite;
      }

      /* Make the dim/grayscale-locked cards more readable */
      .grayscale{ filter: grayscale(85%) brightness(.7) contrast(.95); }
      .opacity-50{ opacity:.55; }

      /* Tap targets on small screens still feel chunky */
      @media (max-width: 640px){
        button{ min-height: 2.5rem; }
      }
    </style>
